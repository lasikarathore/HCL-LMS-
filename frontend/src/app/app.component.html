<ng-container *ngIf="shellVisible; else authLayout">
  <div class="ims-app-shell">
    <aside class="ims-sidebar">
      <div class="ims-sidebar-brand">
        <span class="ims-logo">IMS</span>
        <span class="ims-logo-tag">Inventory</span>
      </div>
      <nav class="ims-nav">
        <a
          routerLink="/dashboard"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          >Dashboard</a
        >
        <a routerLink="/product" routerLinkActive="active" *ngIf="isAdmin()"
          >Products</a
        >
        <a routerLink="/category" routerLinkActive="active" *ngIf="isAdmin()"
          >Categories</a
        >
        <a routerLink="/supplier" routerLinkActive="active" *ngIf="isAdmin()"
          >Suppliers</a
        >
        <a routerLink="/purchase" routerLinkActive="active">Purchase</a>
        <a routerLink="/sell" routerLinkActive="active">Sell</a>
        <a routerLink="/transaction" routerLinkActive="active">Transactions</a>
        <a routerLink="/profile" routerLinkActive="active">Profile</a>
      </nav>
      <div class="ims-sidebar-footer">
        <button type="button" class="ims-logout" (click)="logOut()">
          Sign out
        </button>
      </div>
    </aside>
    <main class="ims-main">
      <router-outlet />
    </main>
  </div>
</ng-container>

<ng-template #authLayout>
  <router-outlet />
</ng-template>
